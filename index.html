    <title>Chukuya</title>
    <link href="https://fonts.googleapis.com/css2?family=UnifrakturMaguntia&display=swap" rel="stylesheet">

    <style>
        @keyframes siteFadeIn { from { opacity: 0; } to { opacity: 1; } }
        body, html {
            margin: 0; padding: 0; min-height: 100%;
            background-color: #ffffff; color: #4A4A4A;
            font-family: 'Arial', sans-serif;
            display: flex; justify-content: center; align-items: center;
            overflow-y: auto; animation: siteFadeIn 2.5s ease-in-out;
        }
        .page-container { width: 90%; max-width: 600px; text-align: center; position: relative; padding: 40px 0; }
        h2.about-title {
            font-family: 'UnifrakturMaguntia', serif; color: #808080;
            font-size: 2.2rem; margin-bottom: 5px; cursor: pointer;
            transition: 0.3s; font-weight: normal;
        }
        h2.about-title:hover { color: #000; letter-spacing: 2px; }
        .angel-image { width: 240px; max-width: 80%; height: auto; opacity: 0.5; margin: 0 auto 25px auto; display: block; }
        .content-wrapper { display: flex; justify-content: space-between; align-items: center; margin-top: 20px; }
        .social-icons-side { display: flex; flex-direction: column; gap: 20px; }
        .social-icons-side a {
            color: #ffffff; background-color: #d1d1d1;
            width: 45px; height: 45px; display: flex;
            justify-content: center; align-items: center;
            border-radius: 50%; text-decoration: none;
            font-size: 1.4rem; transition: 0.3s;
        }
        .social-icons-side a:hover { background-color: #999; }
        .roblox-logo { width: 24px; height: 24px; filter: brightness(0) invert(1); }
        .tree-image { width: 160px; max-width: 40%; height: auto; border-radius: 10px; }
        .modal {
            display: none; position: fixed; z-index: 2000;
            left: 0; top: 0; width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.6);
        }
        .modal-content {
            background-color: #fefefe; margin: 20% auto; padding: 30px;
            width: 80%; max-width: 400px; border-radius: 15px;
            text-align: center; position: relative; line-height: 1.8;
        }
        .close { position: absolute; right: 15px; top: 10px; color: #aaa; font-size: 24px; cursor: pointer; }
        .main-frame { width: 100%; max-width: 500px; margin-bottom: 10px; }
    </style>
